openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Maintenance Task & QC Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: auth
  - name: health
  - name: assets
  - name: tasks
  - name: time
  - name: qc
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login by selecting a user (dev mode)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List all assets
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"

  /assets/{assetId}/sections:
    get:
      operationId: listSections
      tags: [assets]
      summary: List sections for an asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetSection"

  /sections/{sectionId}/stages:
    get:
      operationId: listStages
      tags: [assets]
      summary: List stages for a section
      parameters:
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetStage"

  /stages/{stageId}/components:
    get:
      operationId: listComponents
      tags: [assets]
      summary: List components for a stage
      parameters:
        - name: stageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of components
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetComponent"

  /components/{componentId}/history:
    get:
      operationId: getComponentHistory
      tags: [assets]
      summary: Get task history for a component
      parameters:
        - name: componentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Component task history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentHistory"

  /users:
    get:
      operationId: listUsers
      tags: [tasks]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: assignedTo
          in: query
          required: false
          schema:
            type: integer
        - name: sectionId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID with full detail
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task detail with time entries and QC reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDetail"
    patch:
      operationId: updateTaskStatus
      tags: [tasks]
      summary: Update task status
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusInput"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{taskId}/time:
    get:
      operationId: listTimeEntries
      tags: [time]
      summary: List time entries for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Time entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"
    post:
      operationId: startTimeTracking
      tags: [time]
      summary: Start time tracking (creates an open entry)
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartTimeInput"
      responses:
        "201":
          description: Created time entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"

  /tasks/{taskId}/time/pause:
    post:
      operationId: pauseTimeTracking
      tags: [time]
      summary: Pause active time tracking (requires reason)
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PauseTimeInput"
      responses:
        "200":
          description: Paused time entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"

  /tasks/{taskId}/time/resume:
    post:
      operationId: resumeTimeTracking
      tags: [time]
      summary: Resume time tracking (creates new open entry)
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: New time entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"

  /tasks/{taskId}/qc:
    get:
      operationId: listQcReviews
      tags: [qc]
      summary: List QC reviews for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QC review history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QcReview"
    post:
      operationId: submitQcReview
      tags: [qc]
      summary: Submit a QC review (approve or reject)
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QcReviewInput"
      responses:
        "201":
          description: QC review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QcReview"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [tasks]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginInput:
      type: object
      properties:
        userId:
          type: integer
      required: [userId]

    LoginResult:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Asset:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        model:
          type: string
      required: [id, name, model]

    AssetSection:
      type: object
      properties:
        id:
          type: integer
        assetId:
          type: integer
        name:
          type: string
        description:
          type: string
        order:
          type: integer
      required: [id, assetId, name, order]

    AssetStage:
      type: object
      properties:
        id:
          type: integer
        sectionId:
          type: integer
        name:
          type: string
        stageNumber:
          type: integer
        bladeCountMin:
          type: integer
        bladeCountMax:
          type: integer
      required: [id, sectionId, name, stageNumber]

    AssetComponent:
      type: object
      properties:
        id:
          type: integer
        stageId:
          type: integer
        name:
          type: string
      required: [id, stageId, name]

    ComponentHistory:
      type: object
      properties:
        componentId:
          type: integer
        componentName:
          type: string
        stageName:
          type: string
        sectionName:
          type: string
        totalTasks:
          type: integer
        completedTasks:
          type: integer
        avgRepairHours:
          type: number
        lastMaintenanceDate:
          type: string
          format: date-time
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
      required: [componentId, componentName, totalTasks, completedTasks, tasks]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [engineer, supervisor, site_manager, technician]
      required: [id, name, email, role]

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        assetId:
          type: integer
        assetName:
          type: string
        sectionId:
          type: integer
        sectionName:
          type: string
        stageId:
          type: integer
        stageName:
          type: string
        stageNumber:
          type: integer
        bladeCountMin:
          type: integer
        bladeCountMax:
          type: integer
        componentId:
          type: integer
        componentName:
          type: string
        assignedToId:
          type: integer
        assignedToName:
          type: string
        createdById:
          type: integer
        estimatedHours:
          type: string
        deadline:
          type: string
          format: date-time
        priority:
          type: string
          enum: [high, medium, low]
        status:
          type: string
          enum: [draft, assigned, in_progress, paused, submitted, under_qc, approved, rejected, revision_needed, overdue]
        totalMinutes:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, status, priority, createdAt]

    TaskListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        total:
          type: integer
      required: [data, total]

    TaskDetail:
      allOf:
        - $ref: "#/components/schemas/Task"
        - type: object
          properties:
            timeEntries:
              type: array
              items:
                $ref: "#/components/schemas/TimeEntry"
            qcReviews:
              type: array
              items:
                $ref: "#/components/schemas/QcReview"
            activeTimeEntry:
              $ref: "#/components/schemas/TimeEntry"

    TimeEntry:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        pauseReason:
          type: string
        isActive:
          type: boolean
      required: [id, taskId, userId, startTime, isActive]

    QcReview:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        reviewerId:
          type: integer
        reviewerName:
          type: string
        decision:
          type: string
          enum: [approved, rejected]
        comments:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, taskId, reviewerId, decision, createdAt]

    DashboardStats:
      type: object
      properties:
        totalTasks:
          type: integer
        byStatus:
          type: object
          additionalProperties:
            type: integer
        bySection:
          type: array
          items:
            type: object
            properties:
              sectionName:
                type: string
              count:
                type: integer
            required: [sectionName, count]
        byStage:
          type: array
          items:
            type: object
            properties:
              stageName:
                type: string
              count:
                type: integer
            required: [stageName, count]
        technicianPerformance:
          type: array
          items:
            type: object
            properties:
              technicianId:
                type: integer
              technicianName:
                type: string
              assignedTasks:
                type: integer
              completedTasks:
                type: integer
              avgCompletionHours:
                type: number
            required: [technicianId, technicianName, assignedTasks, completedTasks]
        overdueCount:
          type: integer
        approvalRate:
          type: number
      required: [totalTasks, byStatus, bySection, byStage, overdueCount]

    CreateTaskInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        assetId:
          type: integer
        sectionId:
          type: integer
        stageId:
          type: integer
        componentId:
          type: integer
        assignedToId:
          type: integer
        estimatedHours:
          type: number
        deadline:
          type: string
          format: date-time
        priority:
          type: string
          enum: [high, medium, low]
      required: [title, assetId, sectionId, priority]

    UpdateTaskStatusInput:
      type: object
      properties:
        status:
          type: string
          enum: [draft, assigned, in_progress, paused, submitted, under_qc, approved, rejected, revision_needed, overdue]
        pauseReason:
          type: string
        qcComment:
          type: string
      required: [status]

    StartTimeInput:
      type: object
      properties: {}

    PauseTimeInput:
      type: object
      properties:
        reason:
          type: string
      required: [reason]

    QcReviewInput:
      type: object
      properties:
        decision:
          type: string
          enum: [approved, rejected]
        comments:
          type: string
      required: [decision]
