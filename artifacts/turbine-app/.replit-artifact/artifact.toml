kind = "web"
previewPath = "/"
title = "Maintenance Task & QC Management System"
version = "1.0.0"
id = "artifacts/turbine-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18626

[services.development]
run = "pnpm --filter @workspace/turbine-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/turbine-app", "run", "build" ]
publicDir = "artifacts/turbine-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18626"
BASE_PATH = "/"
